  <!-- Row 4: goal info -->
  <text x="24" y="352" class="success">●</text>
  <text x="42" y="352" class="info">ff5f910b</text>
  <text x="134" y="352" class="muted">attempt 1/3</text>

  <!-- Row 4b: truncated goal objective -->
  <text x="42" y="370" class="dim">Modify the 5 cross-phase transition commands...</text>

  <!-- Row 5: braille "Refining..." with green gradient shimmer -->
  <text x="42" y="392" fill="#C8FFC8">⠗</text>
  <text x="54" y="392" fill="#A8E8A8"> </text>
  <text x="60" y="392" fill="#88D088">R</text>
  <text x="69" y="392" fill="#68B868">e</text>
  <text x="78" y="392" fill="#48A048">f</text>
  <text x="84" y="392" fill="#308830">i</text>
  <text x="93" y="392" fill="#207020">n</text>
  <text x="99" y="392" fill="#105810">i</text>
  <text x="108" y="392" fill="#084008">n</text>
  <text x="117" y="392" fill="#003000">g</text>
  <text x="123" y="392" fill="#002800">.</text>
  <text x="129" y="392" fill="#002000">.</text>
  <text x="135" y="392" fill="#001800">.</text>

  <!-- Row 6: braille "Refining..." with yellow gradient shimmer -->
  <text x="42" y="414" fill="#FFFFB4">⠑</text>
  <text x="54" y="414" fill="#F0F098"> </text>
  <text x="60" y="414" fill="#E0E080">R</text>
  <text x="69" y="414" fill="#D4D468">e</text>
  <text x="78" y="414" fill="#C8C850">f</text>
  <text x="84" y="414" fill="#BCBC38">i</text>
  <text x="93" y="414" fill="#B0B420">n</text>
  <text x="99" y="414" fill="#A8A810">i</text>
  <text x="108" y="414" fill="#A0A000">n</text>
  <text x="117" y="414" fill="#989800">g</text>
  <text x="123" y="414" fill="#909000">.</text>
  <text x="129" y="414" fill="#888800">.</text>
  <text x="135" y="414" fill="#808000">.</text>

  <!-- ============================================ -->
  <!-- STATE 3: GOAL COMPLETE                       -->
  <!-- ============================================ -->

  <text x="24" y="458" class="dim">── COMPLETION ──</text>

  <!-- Row 1: accent bar + title (Jumbo blue) -->
  <text x="24" y="486" class="jumbo-blue">│</text>
  <text x="42" y="486" class="jumbo-blue">Jumbo Refinery</text>

  <!-- Row 2: accent bar + config -->
  <text x="24" y="504" class="jumbo-blue">│</text>
  <text x="42" y="504" class="muted">claude · poll 30s · retries 3 · Q to stop</text>

  <!-- Row 3: divider -->
  <text x="24" y="528" class="dim">─────────────────────────────────────────────────</text>

  <!-- Row 4: completed goal -->
  <text x="24" y="548" class="success">✓</text>
  <text x="42" y="548" class="success">refined</text>
  <text x="118" y="548" class="info">ff5f910b</text>
  <text x="202" y="548" class="dim">3 attempts · 4m 12s</text>

  <!-- Row 5: completed goal objective -->
  <text x="42" y="566" class="dim">Modify the 5 cross-phase transition commands...</text>
</svg>