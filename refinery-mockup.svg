<svg xmlns="http://www.w3.org/2000/svg" width="660" height="590" viewBox="0 0 660 590">
  <defs>
    <style>
      text { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; }
      .jumbo-blue { fill: #66b4f4; }
      .muted { fill: #888888; }
      .dim { fill: #555555; }
      .info { fill: #CCC0A0; }
      .success { fill: #40C840; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="660" height="590" rx="8" fill="#1a1a2e"/>

  <!-- Terminal title bar -->
  <rect width="660" height="32" rx="8" fill="#252540"/>
  <rect y="24" width="660" height="8" fill="#252540"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#27c93f"/>

  <!-- ============================================ -->
  <!-- STATE 1: IDLE / WAITING                      -->
  <!-- ============================================ -->

  <text x="24" y="62" class="dim">── IDLE STATE ──</text>

  <!-- Row 1: accent bar + title (Jumbo blue) -->
  <text x="24" y="90" class="jumbo-blue">│</text>
  <text x="42" y="90" class="jumbo-blue">Jumbo Refinery</text>

  <!-- Row 2: accent bar + config -->
  <text x="24" y="108" class="jumbo-blue">│</text>
  <text x="42" y="108" class="muted">claude · poll 30s · retries 3 · Q to stop</text>

  <!-- Row 3: divider -->
  <text x="24" y="138" class="dim">─────────────────────────────────────────────────</text>

  <!-- Row 4: braille spinner + "Waiting..." with gradient shimmer (red cycle, L→R) -->
  <text x="42" y="160" fill="#FFB6C1">⠺</text>
  <text x="54" y="160" fill="#F49898"> </text>
  <text x="60" y="160" fill="#E87A7A">W</text>
  <text x="69" y="160" fill="#DC5C5C">a</text>
  <text x="78" y="160" fill="#D03E3E">i</text>
  <text x="84" y="160" fill="#C42020">t</text>
  <text x="93" y="160" fill="#B81010">i</text>
  <text x="99" y="160" fill="#AC0505">n</text>
  <text x="108" y="160" fill="#A00000">g</text>
  <text x="117" y="160" fill="#960000">.</text>
  <text x="123" y="160" fill="#8C0000">.</text>
  <text x="129" y="160" fill="#820000">.</text>

  <!-- Row 5: orange cycle snapshot -->
  <text x="42" y="182" fill="#C86400">⠞</text>
  <text x="54" y="182" fill="#D07820"> </text>
  <text x="60" y="182" fill="#D88C40">W</text>
  <text x="69" y="182" fill="#E0A060">a</text>
  <text x="78" y="182" fill="#E8B480">i</text>
  <text x="84" y="182" fill="#F0C498">t</text>
  <text x="93" y="182" fill="#F4CC A8">i</text>
  <text x="99" y="182" fill="#F8D4B8">n</text>
  <text x="108" y="182" fill="#FCD8C0">g</text>
  <text x="117" y="182" fill="#FFDCC8">.</text>
  <text x="123" y="182" fill="#FFE0D0">.</text>
  <text x="129" y="182" fill="#FFE4D8">.</text>

  <!-- Row 6: Jumbo blue cycle snapshot -->
  <text x="42" y="204" fill="#1E50A0">⠊</text>
  <text x="54" y="204" fill="#2C60B0"> </text>
  <text x="60" y="204" fill="#3A70C0">W</text>
  <text x="69" y="204" fill="#4880CC">a</text>
  <text x="78" y="204" fill="#5690D8">i</text>
  <text x="84" y="204" fill="#64A0E4">t</text>
  <text x="93" y="204" fill="#72B0F0">i</text>
  <text x="99" y="204" fill="#80BCF8">n</text>
  <text x="108" y="204" fill="#8CC4FF">g</text>
  <text x="117" y="204" fill="#8CC8FF">.</text>
  <text x="123" y="204" fill="#8CC8FF">.</text>
  <text x="129" y="204" fill="#8CC8FF">.</text>

  <!-- ============================================ -->
  <!-- STATE 2: ACTIVELY REFINING                   -->
  <!-- ============================================ -->

  <text x="24" y="254" class="dim">── ACTIVE STATE ──</text>

  <!-- Row 1: accent bar + title (Jumbo blue) -->
  <text x="24" y="282" class="jumbo-blue">│</text>
  <text x="42" y="282" class="jumbo-blue">Jumbo Refinery</text>

  <!-- Row 2: accent bar + config -->
  <text x="24" y="300" class="jumbo-blue">│</text>
  <text x="42" y="300" class="muted">claude · poll 30s · retries 3 · Q to stop</text>

